<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 1200 650">
  <title id="title">CaptionMan Deployment Boundaries</title>
  <desc id="desc">A diagram separating the official judged Docker image from the hosted demo stack and showing where credentials live.</desc>
  <defs>
    <linearGradient id="brand" x1="0" x2="1">
      <stop offset="0" stop-color="#7357ff"/>
      <stop offset="1" stop-color="#ec64d8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="145%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#251f4f" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#8b7cff"/>
    </marker>
    <style>
      .h{font:700 34px Arial,sans-serif;fill:#17172f}
      .p{font:500 18px Arial,sans-serif;fill:#2f2b45}
      .box{fill:#fff;stroke:#eadfff;stroke-width:2;rx:24;filter:url(#shadow)}
      .inner{fill:#faf7ff;stroke:#eadfff;stroke-width:2;rx:16}
      .t{font:700 18px Arial,sans-serif;fill:#17172f}
      .b{font:500 15px Arial,sans-serif;fill:#2f2b45}
      .ok{font:700 14px Arial,sans-serif;fill:#268b78}
      .warn{font:700 14px Arial,sans-serif;fill:#d25283}
      .line{fill:none;stroke:#8b7cff;stroke-width:3;stroke-dasharray:9 9;marker-end:url(#arrow)}
      .dash{animation:dash 2.4s linear infinite}
      .pulse{animation:pulse 2.8s ease-in-out infinite}
      @keyframes dash{from{stroke-dashoffset:40}to{stroke-dashoffset:0}}
      @keyframes pulse{0%,100%{opacity:1}50%{opacity:.98}}
      @media (prefers-reduced-motion: reduce){.dash,.pulse{animation:none}}
    </style>
  </defs>
  <rect width="1200" height="650" fill="#fff"/>
  <text x="64" y="70" class="h">Two Surfaces, One Core</text>
  <text x="64" y="102" class="p">The official evaluator path stays CLI-first. The hosted demo is only a review surface.</text>

  <rect x="75" y="165" width="480" height="365" class="box pulse"/>
  <text x="115" y="215" class="t">Official Track 2 Docker</text>
  <text x="115" y="244" class="b">public image: ghcr.io/grimnej/captionman:final</text>
  <rect x="115" y="285" width="170" height="72" class="inner"/>
  <text x="145" y="316" class="t">/input</text>
  <text x="145" y="341" class="b">tasks.json</text>
  <rect x="345" y="285" width="170" height="72" class="inner"/>
  <text x="376" y="316" class="t">/output</text>
  <text x="376" y="341" class="b">results.json</text>
  <path d="M286 322 H337" class="line dash"/>
  <rect x="115" y="395" width="400" height="70" rx="18" fill="#f7fffB" stroke="#cdeee4" stroke-width="2"/>
  <text x="145" y="425" class="ok">schema-safe, linux/amd64, frontend-independent</text>
  <text x="145" y="450" class="b">judged mode writes no debug fields</text>

  <rect x="645" y="165" width="480" height="365" class="box pulse"/>
  <text x="685" y="215" class="t">Hosted Demo</text>
  <text x="685" y="244" class="b">https://captionman.grimnej.com/studio</text>
  <rect x="685" y="285" width="170" height="72" class="inner"/>
  <text x="723" y="316" class="t">Next.js</text>
  <text x="719" y="341" class="b">Studio UI</text>
  <rect x="915" y="285" width="170" height="72" class="inner"/>
  <text x="952" y="316" class="t">FastAPI</text>
  <text x="950" y="341" class="b">server calls</text>
  <path d="M856 322 H907" class="line dash"/>
  <rect x="685" y="395" width="400" height="70" rx="18" fill="#fff7fb" stroke="#f5c8e5" stroke-width="2"/>
  <text x="715" y="425" class="warn">credentials stay server-side</text>
  <text x="715" y="450" class="b">browser never receives the Fireworks key</text>

  <path d="M555 348 C600 310 600 310 645 348" class="line dash"/>
  <text x="507" y="590" class="b">Same pipeline. Separate runtime responsibilities.</text>
</svg>
