services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn app.server.main:api --host 0.0.0.0 --port 8000 --reload
    environment:
      AI_PROVIDER: mock
      DATA_DIR: /app/.data
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api/app:/app/app
      - ./prompts:/app/prompts
      - ./.data:/app/.data
      - ./input:/input
      - ./output:/output
  web:
    image: node:24-slim
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm install && pnpm --filter web dev"
    ports:
      - "3000:3000"
    volumes:
      - .:/workspace
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
